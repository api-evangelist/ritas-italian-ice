description: >-
  Rita's Italian Ice is a Philadelphia-area founded franchise chain of frozen
  treat shops known for Italian Ice, Frozen Custard, Gelati, and Misto, operating
  approximately 550-590 locations across the United States under the tagline
  "Ice Custard Happiness." The brand is privately held under MTY Food Group
  (acquired 2021). Rita's maintains a consumer-facing loyalty mobile app and a
  franchise development site, but exposes no public developer API, OpenAPI
  specification, SDK, webhooks, status page, or developer portal at this time.
