  - type: Features
    data:
      - name: Rita's Rewards Loyalty
        description: >-
          Consumer loyalty program where guests earn credit per visit and unlock
          a free treat reward, accessible via the Rita's Ice mobile app, phone
          number, or email at the point of sale.
      - name: Mobile App
        description: >-
          Native iOS and Android app providing a store locator, rewards
          tracking, mobile check-in, and personalized offers.
      - name: Store Locator
        description: >-
          Find Rita's locations across the United States, surfaced in the mobile
          app and on the public website.
  - type: UseCases
    data:
      - name: Earn and Redeem Rewards
        description: >-
          Guests present the mobile app, phone number, or email at checkout to
          earn visit credit and redeem a free Italian Ice, Frozen Custard, or
          Gelati reward.
      - name: Find a Location
        description: >-
          Customers locate nearby Rita's shops using the in-app and website
          store locator.
      - name: Own a Franchise
        description: >-
          Prospective franchisees research and apply to operate a Rita's Italian
          Ice location through the franchise development site.
  - type: Integrations
    data:
      - name: Punchh
        description: >-
          Cloud-based customer loyalty and engagement platform powering the
          Rita's Rewards program and its point-of-sale integration. Third-party
          vendor; Rita's exposes no public API for this integration.
      - name: Relevant Mobile
        description: >-
          Mobile app development partner behind the revamped Rita's Ice app,
          including beacon-based targeting and social check-in features.
      - name: Apple App Store
        description: >-
          Distribution channel for the Rita's Ice iOS app
          (apps.apple.com/us/app/ritas-ice/id532627057).
      - name: Google Play
        description: >-
          Distribution channel for the Rita's Ice Android app
          (play.google.com/store/apps/details?id=com.app.ritas).
description: >-
  Rita's Italian Ice is a Philadelphia-area founded franchise chain of frozen
  treat shops known for Italian Ice, Frozen Custard, Gelati, and Misto, operating
  approximately 550-590 locations across the United States under the tagline
  "Ice Custard Happiness." The brand is privately held under MTY Food Group
  (acquired 2021). Rita's maintains a consumer-facing loyalty mobile app and a
  franchise development site, but exposes no public developer API, OpenAPI
  specification, SDK, webhooks, status page, or developer portal at this time.
  The loyalty program runs on the third-party Punchh customer engagement
  platform, and the mobile app was developed with Relevant Mobile; the only
  network-facing endpoint (api.ritasice.com) is a private backend for the
  consumer app and returns HTTP 403 to unauthenticated requests.
